name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck (tsc --noEmit — strict, must exit 0)
        run: npm run typecheck

      - name: Tests (jest)
        run: npm test

      # Conventional Commits gate (mirrors content-pipeline). eslint is intentionally
      # deferred until a ruleset is agreed, to avoid a day-1 style-only red board.
      - name: Validate commit message
        if: github.event_name == 'push'
        shell: bash
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          if echo "$COMMIT_MSG" | grep -qE "^Merge "; then exit 0; fi
          if ! echo "$COMMIT_MSG" | grep -qE "^(feat|fix|docs|chore|refactor|test|style|perf|ci|build|revert)(\(.+\))?(!)?: .+"; then
            echo "ERROR: HEAD commit message does not follow Conventional Commits format."
            echo "  Got: $COMMIT_MSG"
            echo "  Expected: <type>(<optional scope>): <description>"
            exit 1
          fi
          echo "commit message OK: $COMMIT_MSG"

  privacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The repo is PUBLIC but the board surfaces internal task content. The data
      # snapshot is gitignored and injected out-of-band; this gate fails the build
      # if a home path or a board snapshot ever gets committed by mistake.
      - name: No home paths or data snapshots in tracked files
        shell: bash
        run: |
          set -euo pipefail
          # Fail-closed guard for a STANDALONE (non-pipeline) command.
          # rc 1 = clean (return); rc 0 = forbidden content found (FAIL); rc>=2 = check
          # errored — e.g. a fatal git pathspec error — and MUST fail closed, never pass.
          fail_closed_grep() {  # $1=human label, rest=the standalone command to run
            local label="$1"; shift; local rc=0
            "$@" || rc=$?
            if [ "$rc" -eq 0 ]; then
              echo "ERROR ($label): forbidden content is committed."
              exit 1
            elif [ "$rc" -ge 2 ]; then
              echo "ERROR ($label): check failed to RUN (rc=$rc) — failing closed. A gate that cannot run must never pass."
              exit 1
            fi
          }

          # Home-path class (no hard-coded username): /Users/<name>/, /home/<name>/, C:/Users/<name>/
          # __tests__ is exempt: the redaction unit tests MUST carry synthetic home-path-shaped
          # fixtures (e.g. /Users/alice/) as inputs to prove redact() strips them — those are
          # fictional placeholders, never a real operator path (the real data file is gitignored).
          # Long-form :(exclude)... pathspecs — the short-form bang-exclude shorthand is
          # avoided here because this git version chokes fatal on a short-form exclude
          # whose leading char is a symbol/underscore,
          # and fail_closed_grep is what turns that fatal into a loud CI failure instead of
          # a silently-swallowed pass.
          fail_closed_grep "home-path" \
            git grep -nIE '(/Users/|/home/|[A-Za-z]:[\\/]Users[\\/])[A-Za-z0-9._-]+/' -- . ':(exclude)*.example' ':(exclude).github/workflows/ci.yml' ':(exclude)__tests__/*'
          echo "privacy home-path check OK: rc=1 (no home paths in tracked non-test files)."

          # Flag ANY tracked board snapshot/backup under data/ except the synthetic sample.
          # The git producer is captured STANDALONE (not piped into grep) so a fatal git error
          # fails this step loudly instead of being masked by pipefail + a downstream grep's
          # unrelated no-match rc — see the two `grep <pattern> ... || true` lines below, which
          # run over the already-captured STATIC string, not a live git process.
          tracked="$(git ls-files 'data/*')" || { echo "ERROR (data-snapshot): git ls-files failed to RUN (rc=$?) — failing closed."; exit 1; }
          offenders="$(printf '%s\n' "$tracked" | grep -E 'board' | grep -vE '(^|/)board\.sample\.json$' || true)"
          [ -z "$offenders" ] || { echo "ERROR (data-snapshot): a board data snapshot/backup is tracked under data/ (must stay gitignored — private data): $offenders"; exit 1; }

          # Flag ANY tracked board.json / *.board.json / *.private-bak anywhere in the repo.
          # Same standalone-capture shape as above — no git producer left inside a pipe.
          tracked_all="$(git ls-files)" || { echo "ERROR (board-json): git ls-files failed to RUN (rc=$?) — failing closed."; exit 1; }
          offenders="$(printf '%s\n' "$tracked_all" | grep -E '(^|/)board\.json$|\.board\.json$|\.private-bak$' || true)"
          [ -z "$offenders" ] || { echo "ERROR (board-json): a board data snapshot is tracked (must stay gitignored — private data): $offenders"; exit 1; }

          echo "privacy gate OK: no home paths, no tracked board snapshots."
      # The synthetic sample is the ONE tracked board file, so the gate above can't see
      # a real capture written OVER it. Shape-guard: the real board is always dozens of
      # tickets; the synthetic sample stays small. Caveat: a real capture <=12 tickets
      # would slip through — the size bound is the honest, cheap signal.
      - name: Sample fixture must stay synthetic-sized (no real board captures)
        shell: bash
        run: |
          node -e 'const d=require("./data/board.sample.json"); const n=(d.tickets||[]).length; if(n>12){console.error(`sample-guard FAIL: data/board.sample.json has ${n} tickets - looks like a REAL board capture (synthetic sample must stay <=12). Real captures go to gitignored/scratch paths, never over the tracked fixture.`);process.exit(1)} console.log(`sample-guard OK: ${n} tickets (synthetic-sized)`)'
